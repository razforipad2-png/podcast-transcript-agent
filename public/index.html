<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Podcast Transcript</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; padding: 2rem; width: 100%; max-width: 480px; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
  .tabs { display: flex; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; margin-bottom: 1.5rem; }
  .tab { flex: 1; padding: 8px; font-size: 13px; border: none; cursor: pointer; background: transparent; color: #888; }
  .tab.active { background: #111; color: #fff; }
  label { font-size: 13px; color: #666; display: block; margin-bottom: 6px; margin-top: 14px; }
  input { width: 100%; padding: 9px 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 15px; outline: none; }
  input:focus { border-color: #888; }
  .btn { width: 100%; padding: 10px; font-size: 15px; background: #111; color: #fff; border: none; border-radius: 8px; cursor: pointer; margin-top: 1.25rem; }
  .btn:disabled { background: #aaa; cursor: not-allowed; }
  .status { margin-top: 1.5rem; background: #f5f5f5; border-radius: 10px; padding: 1rem 1.25rem; display: none; }
  .status.visible { display: block; }
  .status-label { font-size: 13px; color: #666; margin-bottom: 4px; }
  .status-text { font-size: 15px; font-weight: 500; margin-bottom: 10px; }
  .progress { height: 4px; background: #e0e0e0; border-radius: 2px; overflow: hidden; }
  .progress-bar { height: 100%; background: #111; border-radius: 2px; transition: width 0.5s; }
  .status-note { font-size: 12px; color: #999; margin-top: 8px; }
  .error { color: #c0392b; font-size: 14px; margin-top: 1rem; display: none; }
  .error.visible { display: block; }
</style>
</head>
<body>
<div class="card">
  <h1>Podcast Transcript</h1>
  <p class="subtitle">Get a transcript for any podcast episode</p>

  <div class="tabs">
    <button class="tab active" id="tab-search" onclick="switchTab('search')">Search by name</button>
    <button class="tab" id="tab-url" onclick="switchTab('url')">Paste a link</button>
  </div>

  <div id="form-search">
    <label>Show name</label>
    <input type="text" id="show" placeholder="e.g. חיות כיס" />
    <label>Episode name or number</label>
    <input type="text" id="episode" placeholder="e.g. מאנדיי or 348" />
  </div>

  <div id="form-url" style="display:none">
    <label>Episode URL</label>
    <input type="text" id="url" placeholder="https://podcasts.apple.com/... or YouTube link" />
  </div>

  <label>Password</label>
  <input type="password" id="password" placeholder="••••••••" />

  <button class="btn" id="submit-btn" onclick="submit()">Get transcript</button>

  <div class="status" id="status">
    <div class="status-label">Status</div>
    <div class="status-text" id="status-text">Searching...</div>
    <div class="progress"><div class="progress-bar" id="progress-bar" style="width:10%"></div></div>
    <div class="status-note">This can take 3–5 minutes for audio transcription</div>
  </div>

  <div class="error" id="error"></div>
</div>

<script>
  const RAILWAY_URL = 'https://podcast-transcript-agent-production-9280.up.railway.app';

  let currentTab = 'search';

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('form-search').style.display = tab === 'search' ? 'block' : 'none';
    document.getElementById('form-url').style.display = tab === 'url' ? 'block' : 'none';
    document.getElementById('tab-search').className = 'tab' + (tab === 'search' ? ' active' : '');
    document.getElementById('tab-url').className = 'tab' + (tab === 'url' ? ' active' : '');
  }

  function setProgress(pct, text) {
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('status-text').textContent = text;
  }

  async function submit() {
    const password = document.getElementById('password').value.trim();
    if (!password) { showError('Password required'); return; }

    let body = {};
    if (currentTab === 'search') {
      const show = document.getElementById('show').value.trim();
      const episode = document.getElementById('episode').value.trim();
      if (!show || !episode) { showError('Please fill in show and episode'); return; }
      body = { show, episode };
    } else {
      const url = document.getElementById('url').value.trim();
      if (!url) { showError('Please paste a URL'); return; }
      body = { url };
    }

    hideError();
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('status').className = 'status visible';
    setProgress(10, 'Starting...');

    try {
      const res = await fetch(RAILWAY_URL + '/transcribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-API-Key': password },
        body: JSON.stringify(body)
      });

      if (res.status === 401) { showError('Wrong password'); return; }
      if (!res.ok) { showError('Something went wrong. Please try again.'); return; }

      const { job_id } = await res.json();
      setProgress(20, 'Searching for transcript...');
      await pollJob(job_id, password);

    } catch (e) {
      showError('Connection error. Please try again.');
    } finally {
      document.getElementById('submit-btn').disabled = false;
    }
  }

  async function pollJob(job_id, password) {
    const steps = [
      [30, 'Looking for existing transcript...'],
      [45, 'Checking YouTube captions...'],
      [58, 'Finding audio via RSS feed...'],
      [70, 'Downloading audio...'],
      [82, 'Transcribing with Whisper...'],
      [90, 'Almost done...'],
    ];
    let step = 0;

    while (true) {
      await new Promise(r => setTimeout(r, 10000));

      if (step < steps.length) {
        setProgress(steps[step][0], steps[step][1]);
        step++;
      }

      const res = await fetch(RAILWAY_URL + '/status/' + job_id, {
        headers: { 'X-API-Key': password }
      });
      const job = await res.json();

      if (job.status === 'done') {
        setProgress(100, 'Done — downloading file...');
        const fileRes = await fetch(RAILWAY_URL + '/result/' + job_id, {
          headers: { 'X-API-Key': password }
        });
        const blob = await fileRes.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'transcript.txt';
        a.click();
        setProgress(100, 'Transcript downloaded.');
        return;
      }

      if (job.status === 'not_found') { showError('Episode not found. Try a different search or URL.'); return; }
      if (job.status === 'error') { showError('Error: ' + job.error); return; }
    }
  }

  function showError(msg) {
    const el = document.getElementById('error');
    el.textContent = msg;
    el.className = 'error visible';
    document.getElementById('status').className = 'status';
    document.getElementById('submit-btn').disabled = false;
  }

  function hideError() {
    document.getElementById('error').className = 'error';
  }
</script>
</body>
</html>
